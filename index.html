function getDaysUntilExp(dateStr) {
  if (!dateStr) return 9999;

  const today = new Date();
  today.setHours(0, 0, 0, 0);

  const exp = new Date(dateStr + "T12:00:00");
  exp.setHours(0, 0, 0, 0);

  return Math.round((exp - today) / 86400000);
}

function getExpiryStatus(dateStr) {
  if (!dateStr) {
    return {
      label: "No date",
      bg: "#f3f4f6",
      color: "#6b7280",
      border: "#d1d5db"
    };
  }

  const d = getDaysUntilExp(dateStr);

  if (d < 0) {
    return {
      label: `Expired ${Math.abs(d)}d ago`,
      bg: "#fee2e2",
      color: "#991b1b",
      border: "#fca5a5"
    };
  }

  if (d <= 3) {
    return {
      label: `${d}d left`,
      bg: "#ffedd5",
      color: "#9a3412",
      border: "#fdba74"
    };
  }

  if (d <= 7) {
    return {
      label: `${d}d left`,
      bg: "#fef9c3",
      color: "#713f12",
      border: "#fde68a"
    };
  }

  return {
    label: `${d}d left`,
    bg: "#dcfce7",
    color: "#166534",
    border: "#86efac"
  };
}

function BarcodeScanner({ onDetected, onClose }) {
  const videoRef = useRef(null);
  const codeReaderRef = useRef(null);
  const streamRef = useRef(null);

  const [error, setError] = useState(null);
  const [scanning, setScanning] = useState(false);
  const [manualBarcode, setManualBarcode] = useState("");

  useEffect(() => {
    let cancelled = false;

    async function startScan() {
      try {
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          setError("Camera scanning is not available in this browser. You can still type or paste the barcode below.");
          return;
        }

        if (!window.ZXing) {
          setError("The scanner library did not load. Check your internet connection, then refresh the page.");
          return;
        }

        const codeReader = new ZXing.BrowserMultiFormatReader();
        codeReaderRef.current = codeReader;

        let selectedDeviceId = null;

        try {
          const devices = await codeReader.listVideoInputDevices();
          const backCamera =
            devices.find(d => /back|rear|environment/i.test(d.label || "")) ||
            devices[devices.length - 1];

          selectedDeviceId = backCamera ? backCamera.deviceId : null;
        } catch {
          selectedDeviceId = null;
        }

        if (cancelled) return;

        setScanning(true);

        await codeReader.decodeFromVideoDevice(
          selectedDeviceId,
          videoRef.current,
          (result, err) => {
            if (cancelled) return;

            if (result) {
              const text = result.getText();
              stopScanner();
              onDetected(text);
            }
          }
        );
      } catch (e) {
        setScanning(false);

        const message = String(e && e.message ? e.message : e);

        if (message.toLowerCase().includes("permission")) {
          setError("Camera permission was blocked. Tap the lock or AA icon in the address bar, allow camera access, then refresh.");
        } else {
          setError("Camera scanning could not start. You can still type or paste the barcode below.");
        }
      }
    }

    function stopScanner() {
      try {
        if (codeReaderRef.current) {
          codeReaderRef.current.reset();
        }
      } catch {}

      try {
        if (streamRef.current) {
          streamRef.current.getTracks().forEach(t => t.stop());
        }
      } catch {}
    }

    startScan();

    return () => {
      cancelled = true;
      stopScanner();
    };
  }, []);

  function submitManualBarcode() {
    const cleaned = manualBarcode.replace(/\D/g, "");

    if (!cleaned) {
      alert("Please enter or paste the barcode number.");
      return;
    }

    try {
      if (codeReaderRef.current) {
        codeReaderRef.current.reset();
      }
    } catch {}

    onDetected(cleaned);
  }

  return (
    <div style={{
      position: "fixed",
      inset: 0,
      background: "rgba(30,27,75,0.82)",
      zIndex: 100,
      display: "flex",
      alignItems: "center",
      justifyContent: "center",
      padding: 20
    }}>
      <div style={{
        background: "#ffffff",

        width: "100%",
        maxWidth: 430,
        boxShadow: "0 12px 40px rgba(0,0,0,0.35)",
        border: "1px solid rgba(255,255,255,0.7)"
      }}>
        <div style={{
          background: "linear-gradient(135deg,#a78bfa,#60a5fa,#86efac)",
          padding: "15px 16px",
          display: "flex",
          justifyContent: "space-between",
          alignItems: "center"
        }}>
          <span style={{color: "#ffffff", fontWeight: 800, fontSize: 15}}>📷 Scan Barcode</span>

          <button
            onClick={onClose}
            style={{
              background: "rgba(255,255,255,0.25)",
              border: "1px solid rgba(255,255,255,0.4)",
              borderRadius: 10,
              color: "#fff",
              padding: "6px 11px",
              cursor: "pointer",

            }}
          >
            ✕ Close
          </button>
        </div>

        <div style={{position: "relative", background: "#000"}}>

            }}

          {scanning && (
            <div style={{

              pointerEvents: "none"
            }}>
              <div style={{

              }} />

              Use

      </div>
    </div>
  );
}

async function lookupBarcode(barcode) {
  try {
    const res = await fetch(`https://world.openfoodfacts.org/api/v0/product/${barcode}.json`);
    const data = await res.json();

    if (data.status === 1 && data.product) {
      const p = data.product;
      const name = p.product_name || p.product_name_en || "";
      const brand = p.brands || "";
      const fullName = brand && name ? `${brand} ${name}` : name || brand || "";
      const cats = (p.categories || "").toLowerCase();

      let category = "Other";

      if (cats.includes("dairy") || cats.includes("yogurt") || cats.includes("cheese") || cats.includes("milk") || cats.includes("butter")) {
        category = "Dairy";
      } else if (cats.includes("frozen")) {
        category = "Frozen";
      } else if (cats.includes("meat") || cats.includes("chicken") || cats.includes("beef") || cats.includes("pork")) {
        category = "Meat";
      } else if (cats.includes("beverage") || cats.includes("juice") || cats.includes("drink")) {
        category = "Beverages";
      } else if (cats.includes("snack") || cats.includes("chip") || cats.includes("cracker") || cats.includes("cookie")) {
        category = "Snacks";
      } else if (cats.includes("fruit") || cats.includes("vegetable") || cats.includes("produce")) {
        category = "Produce";
      } else if (cats.includes("pasta") || cats.includes("rice") || cats.includes("cereal") || cats.includes("bread") || cats.includes("flour")) {
        category = "Pantry";
      }

      return { found: true, name: fullName, category, notes: `UPC: ${barcode}` };
    }

    return { found: false };
  } catch {
    return { found: false };
  }
}

function App() {
  const [items, setItems] = useState(() => {
    try {
      const s = localStorage.getItem(STORAGE_KEY);
      if (!s) return INITIAL_ITEMS;

      const saved = JSON.parse(s);

      // If a previous blank version saved an empty list, automatically restore the built-in pantry list.
      if (!Array.isArray(saved) || saved.length === 0) return INITIAL_ITEMS;

      return saved;
    } catch {
      return INITIAL_ITEMS;
    }
  });

  const [filterCat, setFilterCat] = useState("All");

  const [nextId, setNextId] = useState(() => {
    try {

      if (s) return parseInt(s);
      const maxExisting = INITIAL_ITEMS.reduce((max, item) => Math.max(max, item.id || 0), 0);

      localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
    } catch {}
  }, [items]);

  useEffect(() => {
    try {
      localStorage.setItem(NEXTID_KEY, String(nextId));
    } catch {}
  }, [nextId]);

  const filtered = items
    .filter(i => filterCat === "All" || i.category === filterCat)
    .filter(i => filterLoc === "All" || i.location === filterLoc)
    .filter(i =>
      i.name.toLowerCase().includes(search.toLowerCase()) ||
      (i.notes || "").toLowerCase().includes(search.toLowerCase())
    )
    .sort((a, b) => {
      if (sortBy === "expDate") {
        const da = a.expDate ? new Date(a.expDate + "T12:00:00") : new Date("2099-01-01");
        const db = b.expDate ? new Date(b.expDate + "T12:00:00") : new Date("2099-01-01");
        return da - db;
      }

      if (sortBy === "name") return a.name.localeCompare(b.name);
      if (sortBy === "category") return a.category.localeCompare(b.category);
      return 0;
    });

  function startEdit(item) {
    setEditingId(item.id);
    setForm({...item});
    setShowAdd(false);
  }

  function cancelEdit() {
    setEditingId(null);
    setForm(EMPTY_FORM);
  }

  function saveEdit() {
    if (!form.name.trim()) {
      alert("Please add an item name.");
      return;
    }

    setItems(prev => prev.map(i => i.id === editingId ? {...form, id: editingId} : i));
    setEditingId(null);
    setForm(EMPTY_FORM);
  }

  function deleteItem(id) {
    if (window.confirm("Delete this item?")) {
      setItems(prev => prev.filter(i => i.id !== id));
    }
  }

  function addItem() {
    if (!form.name.trim()) {
      alert("Please add an item name.");
      return;
    }

    const id = nextId;
    setNextId(n => n + 1);
    setItems(prev => [...prev, {...form, id}]);
    setShowAdd(false);
    setForm(EMPTY_FORM);
    setScanStatus(null);
  }

  function toggleOpened(id) {
    setItems(prev => prev.map(i => i.id === id ? {...i, opened: !i.opened} : i));
  }

  function exportBackup() {
    const backup = {
      createdAt: new Date().toISOString(),
      items,
      nextId
    };

    const blob = new Blob([JSON.stringify(backup, null, 2)], {type: "application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");

    a.href = url;
    a.download = "home-inventory-backup.json";
    a.click();

    URL.revokeObjectURL(url);
  }

  function importBackup(event) {
    const file = event.target.files?.[0];
    if (!file) return;

    const reader = new FileReader();

    reader.onload = e => {
      try {
        const data = JSON.parse(e.target.result);
        const importedItems = Array.isArray(data) ? data : data.items;

        if (!Array.isArray(importedItems)) {
          alert("This backup file does not look valid.");
          return;
        }

        const importedNextId =
          data.nextId ||
          importedItems.reduce((max, item) => Math.max(max, item.id || 0), 0) + 1;

        setItems(importedItems);
        setNextId(importedNextId);
        alert("Backup imported.");
      } catch {
        alert("Could not read that backup file.");
      }
    };

    reader.readAsText(file);
    event.target.value = "";
  }

  function recoverStarterInventory() {
    const ok = window.confirm(
      "This will replace the current pantry list with the built-in starter inventory. Continue?"
    );

    if (!ok) return;

    const freshItems = INITIAL_ITEMS.map(item => ({...item}));
    const freshNextId = freshItems.reduce((max, item) => Math.max(max, item.id || 0), 0) + 1;

    setItems(freshItems);
    setNextId(freshNextId);
    setShowAdd(false);
    setEditingId(null);
    setForm(EMPTY_FORM);
    alert("Starter inventory restored.");
  }

  async function handleBarcodeDetected(barcode) {
    setShowScanner(false);
    setShowAdd(true);
    setScanStatus("looking");

    const result = await lookupBarcode(barcode);

    if (result.found) {
      setForm(f => ({
        ...f,
        name: result.name,
        category: result.category,
        notes: result.notes
      }));
      setScanStatus("found");
    } else {
      setForm(f => ({...f, notes: `UPC: ${barcode}`}));
      setScanStatus("notfound");
    }

    setTimeout(() => setScanStatus(null), 4000);
  }

  const expiringCount = items.filter(i => {
    const d = getDaysUntilExp(i.expDate);
    return d >= 0 && d <= 5;
  }).length;

  const expiredCount = items.filter(i => i.expDate && getDaysUntilExp(i.expDate) < 0).length;

  const openedCount = items.filter(i => i.opened).length;

  return (
    <div style={{minHeight: "100vh", fontFamily: "Georgia,serif", paddingBottom: 60}}>
      <div style={{
        background: "linear-gradient(135deg,#c084fc 0%,#93c5fd 38%,#86efac 75%,#fde68a 100%)",
        padding: "28px 24px 20px",
        position: "sticky",
        top: 0,
        zIndex: 10,
        boxShadow: "0 6px 24px rgba(147,197,253,0.35)",
        borderBottom: "1px solid rgba(255,255,255,0.55)"
      }}>
        <div style={{maxWidth: 900, margin: "0 auto"}}>
          <h1 style={{
            color: "#ffffff",
            margin: 0,
            fontSize: 28,
            fontWeight: 800,
            letterSpacing: "-0.5px",
            textShadow: "0 2px 8px rgba(0,0,0,0.15)"
          }}>
            🥗 Home Inventory
          </h1>

          <p style={{
            color: "#ffffff",
            margin: "5px 0 0",
            fontSize: 13,
            fontWeight: 700,
            textShadow: "0 1px 5px rgba(0,0,0,0.12)"
          }}>
            {items.length} items tracked

            {expiringCount > 0 && (
              <span style={{
                marginLeft: 10,
                background: "#fef3c7",
                color: "#92400e",
                borderRadius: 999,
                padding: "2px 8px",
                fontSize: 11,
                fontWeight: 800
              }}>
                ⚡ {expiringCount} expiring soon
              </span>
            )}

            {expiredCount > 0 && (
              <span style={{
                marginLeft: 6,
                background: "#fee2e2",
                color: "#991b1b",
                borderRadius: 999,
                padding: "2px 8px",
                fontSize: 11,
                fontWeight: 800
              }}>
                ❌ {expiredCount} expired
              </span>
            )}
          </p>
        </div>
      </div>

      <div style={{maxWidth: 900, margin: "0 auto", padding: "20px 16px 0"}}>
        <div style={{display: "flex", gap: 12, flexWrap: "wrap", marginBottom: 16}}>
          <SummaryCard emoji="🧺" label="Total Items" value={items.length} gradient="linear-gradient(135deg,#fce7f3,#fdf2f8)" />
          <SummaryCard emoji="⚡" label="Expiring Soon" value={expiringCount} gradient="linear-gradient(135deg,#fef3c7,#ffedd5)" />
          <SummaryCard emoji="❌" label="Expired" value={expiredCount} gradient="linear-gradient(135deg,#fee2e2,#ffe4e6)" />
          <SummaryCard emoji="🔓" label="Opened" value={openedCount} gradient="linear-gradient(135deg,#dbeafe,#ede9fe)" />
        </div>

        <div style={{...S.card, marginBottom: 16, display: "flex", flexDirection: "column", gap: 12}}>
          <input
            style={{
              ...S.input,
              background: "#fdf4ff",
              border: "1.5px solid #e9d5ff"
            }}
            placeholder="🔍 Search items..."
            value={search}
            onChange={e => setSearch(e.target.value)}
          />

          <div style={{display: "flex", gap: 10, flexWrap: "wrap"}}>
            <div style={{flex: 1, minWidth: 120}}>
              <label style={S.label}>Category</label>
              <select style={S.input} value={filterCat} onChange={e => setFilterCat(e.target.value)}>
                {CATEGORIES.map(c => <option key={c}>{c}</option>)}
              </select>
            </div>

            <div style={{flex: 1, minWidth: 120}}>
              <label style={S.label}>Location</label>
              <select style={S.input} value={filterLoc} onChange={e => setFilterLoc(e.target.value)}>
                {["All", ...LOCATIONS].map(l => <option key={l}>{l}</option>)}
              </select>
            </div>

            <div style={{flex: 1, minWidth: 120}}>
              <label style={S.label}>Sort By</label>
              <select style={S.input} value={sortBy} onChange={e => setSortBy(e.target.value)}>
                <option value="expDate">Expiration</option>
                <option value="name">Name</option>
                <option value="category">Category</option>
              </select>
            </div>
          </div>

          <div className="top-actions" style={{display: "flex", gap: 10}}>
            <button
              onClick={() => {
                setShowAdd(true);
                setEditingId(null);
                setForm(EMPTY_FORM);
                setScanStatus(null);
              }}
              style={{...S.btnPrimary, flex: 1, padding: "12px 16px", fontSize: 14}}
            >
              + Add Item
            </button>

            <button
              onClick={() => {
                setShowScanner(true);
                setShowAdd(false);
                setForm(EMPTY_FORM);
                setScanStatus(null);
              }}
              style={{
                background: "linear-gradient(135deg,#60a5fa,#a78bfa)",
                color: "#fff",
                border: "none",
                borderRadius: 14,
                padding: "12px 16px",
                fontWeight: 800,
                fontSize: 14,
                cursor: "pointer",
                boxShadow: "0 6px 14px rgba(96,165,250,0.28)"
              }}
            >
              📷 Scan
            </button>

            <button
              onClick={exportBackup}
              style={{
                background: "linear-gradient(135deg,#fcd34d,#fb923c)",
                color: "#7c2d12",
                border: "none",
                borderRadius: 14,
                padding: "12px 16px",
                fontWeight: 800,
                fontSize: 14,
                cursor: "pointer",
                boxShadow: "0 6px 14px rgba(251,146,60,0.24)"
              }}
            >
              ⬇️ Backup
            </button>

            <label style={{
              background: "linear-gradient(135deg,#86efac,#67e8f9)",
              color: "#14532d",
              border: "none",
              borderRadius: 14,
              padding: "12px 16px",
              fontWeight: 800,
              fontSize: 14,
              cursor: "pointer",
              boxShadow: "0 6px 14px rgba(52,211,153,0.24)",
              textAlign: "center"
            }}>
              ⬆️ Restore
              <input type="file" accept=".json,application/json" onChange={importBackup} style={{display: "none"}} />
            </label>

            <button
              onClick={recoverStarterInventory}
              style={{
                background: "linear-gradient(135deg,#fecdd3,#fdba74)",
                color: "#7c2d12",
                border: "none",
                borderRadius: 14,
                padding: "12px 16px",
                fontWeight: 800,
                fontSize: 14,
                cursor: "pointer",
                boxShadow: "0 6px 14px rgba(251,146,60,0.22)"
              }}
            >
              ♻️ Recover List
            </button>
          </div>
        </div>

        {showScanner && (
          <BarcodeScanner
            onDetected={handleBarcodeDetected}
            onClose={() => setShowScanner(false)}
          />
        )}

        {showAdd && (
          <div style={S.card}>
            <h3 style={{margin: "0 0 14px", color: "#6b21a8", fontSize: 17}}>
              Add New Item
            </h3>

            {scanStatus === "looking" && (
              <div style={{
                background: "#eff6ff",
                border: "1.5px solid #bfdbfe",
                borderRadius: 12,
                padding: "10px 12px",
                marginBottom: 12,
                fontSize: 13,
                color: "#1d4ed8",
                fontWeight: 700
              }}>
                🔍 Looking up product…
              </div>
            )}

            {scanStatus === "found" && (
              <div style={{
                background: "#f0fdf4",
                border: "1.5px solid #bbf7d0",
                borderRadius: 12,
                padding: "10px 12px",
                marginBottom: 12,
                fontSize: 13,
                color: "#166534",
                fontWeight: 700
              }}>
                ✅ Product found! Review and update the fields below.
              </div>
            )}

            {scanStatus === "notfound" && (
              <div style={{
                background: "#fef9c3",
                border: "1.5px solid #fde68a",
                borderRadius: 12,
                padding: "10px 12px",
                marginBottom: 12,
                fontSize: 13,
                color: "#92400e",
                fontWeight: 700
              }}>
                ⚠️ Product not in database. UPC saved to notes. Please fill in the name.
              </div>
            )}

            <FormFields f={form} setF={setForm} allItems={items} />

            <div style={{display: "flex", gap: 10, marginTop: 14, flexWrap: "wrap"}}>
              <button onClick={addItem} style={S.btnPrimary}>Save Item</button>
              <button
                onClick={() => {
                  setShowAdd(false);
                  setForm(EMPTY_FORM);
                  setScanStatus(null);
                }}
                style={S.btnSecondary}
              >
                Cancel
              </button>
            </div>
          </div>
        )}

        {filtered.length === 0 && (
          <div style={{
            textAlign: "center",
            color: "#6b7280",
            padding: 40,
            background: "rgba(255,255,255,0.65)",
            borderRadius: 20,
            border: "1.5px dashed #d8b4fe"
          }}>
            No items found.
          </div>
        )}

        {filtered.map(item => {
          const isEditing = editingId === item.id;
          const days = getDaysUntilExp(item.expDate);
          const expired = item.expDate && days < 0;

          let borderColor = "#86efac";
          if (expired) borderColor = "#fca5a5";
          else if (item.expDate && days <= 3) borderColor = "#fb923c";
          else if (item.expDate && days <= 7) borderColor = "#fde047";
          else if (item.location === "Freezer") borderColor = "#93c5fd";
          else if (item.location === "Pantry") borderColor = "#c084fc";
          else if (item.location === "Counter") borderColor = "#f9a8d4";

          return (
            <div
              key={item.id}
              style={{
                ...S.card,
                borderLeft: `6px solid ${borderColor}`,
                opacity: expired ? 0.86 : 1
              }}
            >
              {isEditing ? (
                <>
                  <h3 style={{margin: "0 0 14px", color: "#6b21a8", fontSize: 16}}>
                    Edit Item
                  </h3>

                  <FormFields f={form} setF={setForm} allItems={[]} />

                  <div style={{display: "flex", gap: 10, marginTop: 14, flexWrap: "wrap"}}>
                    <button onClick={saveEdit} style={S.btnPrimary}>Save</button>
                    <button onClick={cancelEdit} style={S.btnSecondary}>Cancel</button>
                  </div>
                </>
              ) : (
                <div style={{
                  display: "flex",
                  justifyContent: "space-between",
                  alignItems: "flex-start",
                  gap: 12,
                  flexWrap: "wrap"
                }}>
                  <div style={{flex: 1, minWidth: 230}}>
                    <div style={{display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap"}}>
                      <span style={{fontWeight: 800, fontSize: 15, color: "#4c1d95"}}>
                        {item.name}
                      </span>

                      {item.opened && (
                        <span style={{
                          background: "#fef3c7",
                          color: "#92400e",
                          border: "1px solid #fde68a",
                          padding: "2px 8px",
                          borderRadius: 999,
                          fontSize: 10,
                          fontWeight: 800
                        }}>
                          OPENED
                        </span>
                      )}
                    </div>

                    <div style={{display: "flex", gap: 6, marginTop: 7, flexWrap: "wrap", alignItems: "center"}}>
                      <span style={S.tag}>{item.category}</span>
                      <span style={{...S.tag, background: "#dbeafe", color: "#1d4ed8"}}>{item.location}</span>
                      <span style={{...S.tag, background: "#f3e8ff", color: "#6b21a8"}}>Qty: {item.quantity}</span>
                      <ExpiryBadge dateStr={item.expDate} />
                    </div>

                    {item.expDate && (
                      <div style={{fontSize: 11, color: "#6b7280", marginTop: 5}}>
                        {new Date(item.expDate + "T12:00:00").toLocaleDateString("en-US", {
                          month: "short",
                          day: "numeric",
                          year: "numeric"
                        })}
                      </div>
                    )}

                    {item.notes && (
                      <div style={{
                        fontSize: 12,
                        color: "#6b7280",
                        marginTop: 6,
                        fontStyle: "italic",
                        lineHeight: 1.35
                      }}>
                        {item.notes}
                      </div>
                    )}
                  </div>

                  <div className="item-actions" style={{display: "flex", gap: 7, flexShrink: 0}}>
                    <button
                      onClick={() => toggleOpened(item.id)}
                      title={item.opened ? "Mark sealed" : "Mark opened"}
                      style={{
                        ...S.iconBtn,
                        background: item.opened ? "#fef3c7" : "#dcfce7",
                        color: item.opened ? "#92400e" : "#166534"
                      }}
                    >
                      {item.opened ? "🔓" : "🔒"}
                    </button>

                    <button onClick={() => startEdit(item)} style={S.iconBtn}>✏️</button>

                    <button
                      onClick={() => deleteItem(item.id)}
                      style={{
                        ...S.iconBtn,
                        background: "#fff1f2",
                        borderColor: "#fecdd3"
                      }}
                    >
                      🗑️
                    </button>
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
